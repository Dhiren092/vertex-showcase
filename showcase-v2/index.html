<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Showcase | Vertex Experience</title>
  <script>/* Relative asset paths need a trailing slash on the folder URL. */
    if (!/(\/|\.html)$/.test(location.pathname)) location.replace(location.pathname + "/" + location.search);
  </script>
  <meta name="description" content="Explore the Vertex Experience portfolio — UI/UX, web design, mobile apps and branding projects.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/showcase.css">
</head>
<body>

  <header class="topbar" id="topbar">
    <div class="container topbar-inner">
      <a class="logo" href="https://www.vertexexperience.com/" aria-label="Vertex Experience Homepage">
        <img src="images/logo.svg" alt="Vertex Experience">
      </a>
      <nav class="nav-menu-wrap" aria-label="Main navigation">
        <div class="nav-menu-clip">
          <ul class="nav-menu" role="list">
            <li><a class="nav-link" href="https://www.vertexexperience.com/#case-studies">Case Studies</a></li>
            <li><a class="nav-link" href="https://www.vertexexperience.com/#about">About Us</a></li>
            <li><a class="nav-link" href="https://www.vertexexperience.com/branding">Branding</a></li>
            <li><a class="nav-link" href="https://www.vertexexperience.com/blog">Blog</a></li>
            <li><a class="nav-link" href="https://www.vertexexperience.com/#process">How it Works</a></li>
            <li><a class="nav-link is-current" href="./" aria-current="page">Showcase</a></li>
          </ul>
        </div>
      </nav>
      <div class="topbar-actions">
        <a class="btn-cta is-secondary" href="https://www.vertexexperience.com/free-audit"><span>Book a free audit</span></a>
        <button class="nav-toggle" type="button" aria-label="Menu" aria-expanded="false">
          <svg class="icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 8h16M4 16h16"/></svg>
          <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <nav class="container filters" id="filters" aria-label="Choose a category">
    <button class="chip is-active" data-filter="UI/UX design">UI/UX design</button>
    <button class="chip" data-filter="Branding design">Branding design</button>
  </nav>

  <main class="container">
    <section class="cover" id="cover">
      <button class="cover-stage" id="cover-stage" aria-label="Browse projects">
        <img id="cover-img" alt="">
        <span class="cover-hint"><span>Browse projects</span></span>
      </button>
      <p class="cover-caption" id="cover-caption"></p>
    </section>
  </main>

  <script src="js/projects.js"></script>
  <script src="js/grid.js"></script>
  <script>
    (function () {
      const topbar = document.getElementById("topbar");
      const toggle = topbar.querySelector(".nav-toggle");
      toggle.addEventListener("click", function () {
        const open = topbar.classList.toggle("nav-open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
      });
    })();
  </script>
</body>
</html>
